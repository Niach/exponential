name: "exponential"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: exponential
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - 127.0.0.1:54321:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical

  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/exponential?sslmode=disable
      ELECTRIC_INSECURE: true
    ports:
      - 127.0.0.1:30000:3000
    depends_on:
      - postgres

  garage:
    image: dxflrs/garage:v2.1.0
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET_FILE: /etc/garage/rpc_secret
      GARAGE_ADMIN_TOKEN_FILE: /etc/garage/admin_token
    volumes:
      - ./infra/garage/garage.toml:/etc/garage.toml:ro
      - ./infra/garage/secrets:/etc/garage:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - 127.0.0.1:3900:3900
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 6

  caddy:
    image: caddy:2-alpine
    ports:
      - 3000:3000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optional remote-start/steer relay (masterplan §3). Off by default:
  # `docker compose --profile steer up -d`. Point the web app + desktops at it
  # via STEER_RELAY_URL=ws://localhost:4002 (ws(s):// form; the web app derives the http(s) origin) with the same STEER_RELAY_SECRET.
  steer-relay:
    profiles: [steer]
    build:
      context: .
      dockerfile: Dockerfile.steer-relay
    environment:
      STEER_RELAY_SECRET: ${STEER_RELAY_SECRET:-dev-steer-secret}
    ports:
      - 4002:4002

volumes:
  postgres_data:
  garage_meta:
  garage_data:
  caddy_data:
  caddy_config:
