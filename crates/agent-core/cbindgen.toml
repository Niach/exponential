# cbindgen config for generating include/agent_core.h from the Rust FFI surface.
#
# M0 keeps include/agent_core.h hand-written (cbindgen is not yet installed and
# the stub is dependency-free). Once network/deps are wired (M6), add cbindgen as
# a build-dependency and a build.rs that regenerates the header on `cargo build`;
# from then on this file is the source of truth and the header is generated.
language = "C"
include_guard = "EXP_AGENT_CORE_H"
cpp_compat = true
style = "type"
autogen_warning = "/* AUTO-GENERATED by cbindgen — do not edit by hand. */"

[export]
prefix = ""
