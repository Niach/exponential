<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="-11 -11 122 122">
  <!-- App-icon variant (EXP-16): white disc on transparent — the plain logo.svg
       is a black disc that vanishes on the dark taskbars/launchers desktop Linux
       defaults to. The viewBox is padded so the glyph fills ~82% of the icon
       square (EXP-143) — a full-bleed circle reads oversized next to other
       launcher/taskbar icons.
       This comment MUST stay inside the <svg> element (EXP-151): the file is
       installed verbatim as the hicolor theme icon, and gdk-pixbuf recognizes
       SVG only by its magic prefixes (`<svg`, `<?xml`, `<!DOCTYPE svg`) — a
       leading comment makes GtkIconTheme fail to load it and the Linux taskbar
       icon disappears entirely. -->
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"></circle></clipPath>
    <mask id="m">
      <rect x="-11" y="-11" width="122" height="122" fill="white"></rect>
      <g clip-path="url(#c)">
        <path d="M -5.87 62.01 C 39.09 65.44 48.72 28.71 49.03 -6.21" stroke="black" stroke-width="6" fill="none"></path>
        <path d="M -5.07 86.00 C 53.78 84.42 71.13 37.29 73.00 -5.09" stroke="black" stroke-width="6" fill="none"></path>
        <path d="M -4.27 109.99 C 68.46 103.40 93.55 45.86 96.98 -3.98" stroke="black" stroke-width="6" fill="none"></path>
      </g>
    </mask>
  </defs>
  <circle cx="50" cy="50" r="50" fill="#ffffff" mask="url(#m)"></circle>
</svg>
