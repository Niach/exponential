<!-- macOS app-icon variant (EXP-68, reworked in EXP-143): a bare white disc
     on transparent got composited onto the system's default grey icon
     backdrop and washed out, so the icon now draws its own plate — the dark
     rounded square macOS icons are expected to fill (Apple icon grid: 824/1024
     square, ~185 corner radius), with the white disc padded inside it. -->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="50"></circle></clipPath>
    <mask id="m">
      <rect x="-11" y="-11" width="122" height="122" fill="white"></rect>
      <g clip-path="url(#c)">
        <path d="M -5.87 62.01 C 39.09 65.44 48.72 28.71 49.03 -6.21" stroke="black" stroke-width="6" fill="none"></path>
        <path d="M -5.07 86.00 C 53.78 84.42 71.13 37.29 73.00 -5.09" stroke="black" stroke-width="6" fill="none"></path>
        <path d="M -4.27 109.99 C 68.46 103.40 93.55 45.86 96.98 -3.98" stroke="black" stroke-width="6" fill="none"></path>
      </g>
    </mask>
  </defs>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="#18181b"></rect>
  <g transform="translate(192 192) scale(6.4)">
    <circle cx="50" cy="50" r="50" fill="#ffffff" mask="url(#m)"></circle>
  </g>
</svg>
