# apps/desktop/.cargo/config.toml — per-target build config (masterplan-v3 §3.7).
# Linux pkg-config hints land in Phase 1 if the wgpu/gpui build reveals a need.
#
# NOTE (macOS deployment target): we deliberately do NOT force a
# `-mmacosx-version-min` / MACOSX_DEPLOYMENT_TARGET override here. A global
# `[target.aarch64-apple-darwin]` rustflag also applies to the HOST build tools
# (proc-macro dylibs), and on the current toolchain (rustc 1.96 + the Darwin 27
# linker) a lowered min-version on a *release-profile* proc-macro dylib emits a
# mis-aligned LINKEDIT code signature — dlopen then fails with "can't find crate
# for <x>_derive" and every release build breaks. (Debug proc-macros at the same
# min-version are fine; only release is affected.) rustc's built-in arm64 default
# already targets an older floor than we ship, and the shipped `.app`'s
# LSMinimumSystemVersion (assets/packaging/Info.plist) is the real install gate.
# If a per-binary min-version is ever needed, pass `--target aarch64-apple-darwin`
# so the flag hits only the app, not the host proc-macros.

# EXP-76 (pending toolchain): `[resolver] feature-unification = "workspace"`
# is the real fix for variant churn — without it, differently-selected cargo
# invocations (`-p app`, workspace `cargo test`, per-crate tests) can each
# unify features differently, and cargo keeps a full parallel copy of the
# affected dep tree per variant (3-7 ~134MB libgpui copies were measured in
# single target dirs). On our pinned 1.96.0 the key is still nightly-gated
# (cargo warns "ignoring ... without -Zfeature-unification" on EVERY command),
# so it must stay off; add it the moment a toolchain bump stabilizes it.
