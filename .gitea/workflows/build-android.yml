name: Build Android APK

on:
  push:
    tags:
      - 'android-v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/android/**/*.gradle*', 'apps/android/gradle/wrapper/gradle-wrapper.properties', 'apps/android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/android-v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        working-directory: apps/android
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: exponential-debug-${{ steps.version.outputs.VERSION }}.apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: exponential-release-unsigned-${{ steps.version.outputs.VERSION }}.apk
          path: apps/android/app/build/outputs/apk/release/app-release-unsigned.apk
