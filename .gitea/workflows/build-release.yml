name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-dev'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: gitea.home.straehhuber.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            gitea.home.straehhuber.com/niach/exponential:latest
            gitea.home.straehhuber.com/niach/exponential:${{ steps.version.outputs.VERSION }}

      - name: Trigger Portainer stack redeploy
        uses: wirgen/portainer-stack-redeploy-action@v1.1
        with:
          portainerUrl: ${{ vars.PORTAINER_URL }}
          accessToken: ${{ secrets.PORTAINER_API_KEY }}
          stackId: ${{ vars.PORTAINER_STACK_ID }}
          endpointId: ${{ vars.PORTAINER_ENDPOINT_ID }}

      - name: Log out from registry
        if: always()
        run: docker logout gitea.home.straehhuber.com
