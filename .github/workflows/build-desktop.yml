name: build-desktop
on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

jobs:
  # Gate 1: the committed Rust generated files must match contract.json / tokens.json.
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter @exp/domain-contract generate
      - run: bun run --filter @exp/design-tokens generate
      - name: Fail if the committed Rust files drifted
        run: git diff --exit-code -- apps/desktop/crates/domain/src/contract.generated.rs apps/desktop/crates/theme/src/tokens.generated.rs

  # Gate 2 (EXP-222): everything statically linked into the shipped binary must
  # carry an allowed license (deny.toml). Zed's GPL-3.0 ztracing/zlog are patched
  # out to clean-room shims in apps/desktop/Cargo.toml — this keeps a copyleft
  # dependency from ever sneaking back in.
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: apps/desktop/Cargo.toml
          command: check licenses

  build:
    needs: [codegen-drift, license-audit]
    strategy:
      fail-fast: false
      matrix:
        # Two channels (production → app.exponential.at, staging →
        # next.exponential.at) × two OSes. Staging builds pass `--features
        # staging` and carry a distinct app id so both can coexist.
        include:
          - os: macos-14 # arm64
            target: aarch64-apple-darwin
            channel: production
          - os: macos-14
            target: aarch64-apple-darwin
            channel: staging
          # NB: the runner's glibc is the AppImage's compatibility floor
          # (glibc is forward-compatible only). ubuntu-22.04 → glibc 2.35,
          # covering current mainstream distros. For older targets, run this
          # job in an `ubuntu:20.04` container instead.
          - os: ubuntu-22.04 # x86_64
            target: x86_64-unknown-linux-gnu
            channel: production
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            channel: staging
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            channel: production
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            channel: staging
    runs-on: ${{ matrix.os }}
    # Windows is the newest, least-proven target — don't let it block a
    # macOS/Linux release. Remove once a few releases have shipped green.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Linux system deps (wgpu/gpui + AppImage packaging)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev \
            libssl-dev libfontconfig1-dev pkg-config \
            librsvg2-bin file wget
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
          key: ${{ matrix.channel }}
      - name: Cargo features for channel
        id: feat
        shell: bash
        run: |
          if [ "${{ matrix.channel }}" = "staging" ]; then
            echo "flags=--features staging" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      # Version strings (from the desktop-v* tag; falls back to 0.0.0 on
      # workflow_dispatch). Derived BEFORE the build so it can be compiled into
      # the binary (the in-app update check compares the running version against
      # the latest GitHub release), and reused by macOS packaging below.
      - name: Derive version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME:-}"
          version="${ref#desktop-v}"
          [ "$version" = "$ref" ] && version="0.0.0"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build (${{ matrix.channel }})
        # EXP_DESKTOP_VERSION is read by `ui::update::current_version` via
        # `option_env!` — without it the binary reports the static 0.1.0
        # workspace version and would always think an update is available.
        env:
          EXP_DESKTOP_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo build --release --manifest-path apps/desktop/Cargo.toml -p app ${{ steps.feat.outputs.flags }}

      # Linux → package a single-file AppImage. The raw `.AppImage` is the
      # ONLY Linux asset (EXP-68 — no `.tar.gz` twin): it is both the
      # marketing `releases/latest/download/<name>.AppImage` link and the
      # asset the in-app self-updater expects (`updater::expected_asset_name`).
      - name: Package AppImage
        if: runner.os == 'Linux'
        run: apps/desktop/scripts/build-appimage.sh ${{ matrix.channel }}
      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: exp-desktop-${{ matrix.channel }}-${{ matrix.target }}
          path: apps/desktop/target/Exponential-${{ matrix.channel }}-*.AppImage
          if-no-files-found: error

      # Windows → the raw `.exe`, the ONLY Windows asset (EXP-68 — the old
      # `.zip` twin is gone). It is both the marketing download link and the
      # asset the in-app self-updater (EXP-22) swaps the running exe with
      # (`updater::expected_asset_name`). The exponential:// protocol handler +
      # single instance are self-registered at first launch (HKCU, no
      # installer needed); a signed MSI/MSIX is future work.
      - name: Package Windows exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item apps/desktop/target/release/exp-desktop.exe `
            "apps/desktop/target/Exponential-${{ matrix.channel }}-x86_64-windows.exe"
      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: exp-desktop-${{ matrix.channel }}-${{ matrix.target }}
          path: apps/desktop/target/Exponential-${{ matrix.channel }}-x86_64-windows.exe
          if-no-files-found: error

      # macOS → assemble a proper .app bundle. The Info.plist declares the
      # `exponential://` URL scheme (CFBundleURLTypes) so the OAuth-callback / invite
      # deep link routes into on_open_urls.
      #
      # Signing/notarization is GATED on secrets: when the Developer ID cert +
      # notary API-key secrets are present the .app is Developer-ID signed with
      # a hardened runtime and shipped as a notarized+stapled .dmg (Gatekeeper
      # clean); when they are absent CI falls back to today's ad-hoc-signed
      # .zip so it stays green pre-account (Apple account = release checklist).
      - name: Icon rasterizer (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: brew install librsvg

      # Are the Developer ID signing secrets configured? Drives the signed-dmg
      # vs ad-hoc-zip branch below (secrets can't be used in `if:` directly).
      - name: Detect macOS signing secrets
        if: runner.os == 'macOS'
        id: signing
        env:
          CERT: ${{ secrets.MACOS_CERT_P12 }}
        shell: bash
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "note: MACOS_CERT_P12 unset — ad-hoc .zip fallback (no notarized .dmg)"
          fi

      # Import the Developer ID Application cert into a throwaway keychain and
      # surface the identity hash for codesign. Only on signed builds.
      - name: Import Developer ID certificate
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        id: cert
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        shell: bash
        run: |
          KEYCHAIN="$RUNNER_TEMP/exp-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep 'Developer ID Application' | head -1 | awk '{print $2}')"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Package .app
        if: runner.os == 'macOS'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD: ${{ github.run_number }}
          # Empty on unsigned builds → build-macos-app.sh falls back to ad-hoc.
          MACOS_SIGN_IDENTITY: ${{ steps.cert.outputs.identity }}
        run: apps/desktop/scripts/build-macos-app.sh ${{ matrix.channel }}

      # Signed builds → notarized + stapled .dmg.
      - name: Package notarized .dmg
        if: runner.os == 'macOS' && steps.signing.outputs.enabled == 'true'
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
        shell: bash
        run: |
          echo "$NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary.p8" \
            apps/desktop/scripts/build-macos-dmg.sh ${{ matrix.channel }}
          rm -f "$RUNNER_TEMP/notary.p8"

      # Unsigned fallback → ad-hoc .zip (today's behavior, keeps CI green).
      - name: Zip .app (unsigned fallback)
        if: runner.os == 'macOS' && steps.signing.outputs.enabled != 'true'
        shell: bash
        run: |
          cd apps/desktop/target
          app=$(ls -d *.app | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$app" "exp-desktop-${{ matrix.channel }}.zip"

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: exp-desktop-${{ matrix.channel }}-${{ matrix.target }}
          # Exactly one of these exists (signed .dmg vs ad-hoc .zip).
          path: |
            apps/desktop/target/Exponential-${{ matrix.channel }}.dmg
            apps/desktop/target/exp-desktop-${{ matrix.channel }}.zip
          if-no-files-found: error

  # Publish the PRODUCTION-channel artifacts to a GitHub Release on desktop-v*
  # tags (§11.2): stable `/releases/latest/download/<asset>` URLs (the marketing
  # DownloadSection links) + a SHA256SUMS.txt. Staging stays artifacts-only —
  # it is never downloaded from a Release. Skipped on workflow_dispatch (no tag).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download production artifacts
        uses: actions/download-artifact@v4
        with:
          # All production matrix legs — exactly one asset per OS (EXP-68):
          # linux .AppImage, windows .exe, macOS .dmg (or the ad-hoc .zip
          # fallback while unsigned).
          pattern: exp-desktop-production-*
          path: dist
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: |
          ls -la
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Desktop MUST own releases/latest: the marketing download links
          # (`releases/latest/download/<asset>`) and the in-app update check
          # both resolve `latest` (android releases set make_latest: false).
          make_latest: true
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
