name: build-desktop
on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

jobs:
  # Gate 1: the committed Rust generated files must match contract.json / tokens.json.
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter @exp/domain-contract generate
      - run: bun run --filter @exp/design-tokens generate
      - name: Fail if the committed Rust files drifted
        run: git diff --exit-code -- apps/desktop/crates/domain/src/contract.generated.rs apps/desktop/crates/theme/src/tokens.generated.rs

  build:
    needs: codegen-drift
    strategy:
      fail-fast: false
      matrix:
        # Two channels (production → app.exponential.at, staging →
        # next.exponential.at) × two OSes. Staging builds pass `--features
        # staging` and carry a distinct app id so both can coexist.
        include:
          - os: macos-14 # arm64
            target: aarch64-apple-darwin
            channel: production
          - os: macos-14
            target: aarch64-apple-darwin
            channel: staging
          # NB: the runner's glibc is the AppImage's compatibility floor
          # (glibc is forward-compatible only). ubuntu-22.04 → glibc 2.35,
          # covering current mainstream distros. For older targets, run this
          # job in an `ubuntu:20.04` container instead.
          - os: ubuntu-22.04 # x86_64
            target: x86_64-unknown-linux-gnu
            channel: production
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            channel: staging
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Linux system deps (wgpu/gpui + AppImage packaging)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev \
            libssl-dev libfontconfig1-dev pkg-config \
            librsvg2-bin file wget
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
          key: ${{ matrix.channel }}
      - name: Cargo features for channel
        id: feat
        shell: bash
        run: |
          if [ "${{ matrix.channel }}" = "staging" ]; then
            echo "flags=--features staging" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build (${{ matrix.channel }})
        run: cargo build --release --manifest-path apps/desktop/Cargo.toml -p app ${{ steps.feat.outputs.flags }}

      # Version strings for the bundle (from the desktop-v* tag; falls back to
      # 0.0.0 on workflow_dispatch). Shared by macOS packaging below.
      - name: Derive version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME:-}"
          version="${ref#desktop-v}"
          [ "$version" = "$ref" ] && version="0.0.0"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Linux → package a single-file AppImage.
      - name: Package AppImage
        if: runner.os == 'Linux'
        run: apps/desktop/scripts/build-appimage.sh ${{ matrix.channel }}
      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: exp-desktop-${{ matrix.channel }}-${{ matrix.target }}
          path: apps/desktop/target/Exponential-${{ matrix.channel }}-*.AppImage

      # macOS → assemble a proper .app bundle. The Info.plist declares the
      # `exp://` URL scheme (CFBundleURLTypes) so the OAuth-callback / invite
      # deep link routes into on_open_urls. Ad-hoc signed only; Developer ID
      # signing + notarization stay manual release steps (CLAUDE.md checklist).
      - name: Icon rasterizer (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: brew install librsvg
      - name: Package .app
        if: runner.os == 'macOS'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD: ${{ github.run_number }}
        run: apps/desktop/scripts/build-macos-app.sh ${{ matrix.channel }}
      - name: Zip .app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd apps/desktop/target
          app=$(ls -d *.app | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$app" "exp-desktop-${{ matrix.channel }}.zip"
      - name: Upload macOS .app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: exp-desktop-${{ matrix.channel }}-${{ matrix.target }}
          path: apps/desktop/target/exp-desktop-${{ matrix.channel }}.zip
