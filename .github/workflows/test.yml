name: test

# CI test gate: typecheck + unit tests for the bun workspaces, the desktop
# Rust workspace, and the Android app. Runs on every push/PR to master so
# red tests are visible before anything ships (build-issues-web.yml runs the
# web portion again as a hard gate before pushing the production image).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck web
        run: bun run typecheck
      - name: Web unit tests
        run: bun run test
      - name: Widget unit tests
        run: bun run test:widget
      - name: Steer relay + ticket tests
        run: bun run test:steer-relay

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Linux system deps (wgpu/gpui)
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev \
            libssl-dev libfontconfig1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
      - name: Cargo tests
        working-directory: apps/desktop
        run: cargo test --no-fail-fast

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/android/**/*.gradle*', 'apps/android/gradle/wrapper/gradle-wrapper.properties', 'apps/android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Android unit tests
        working-directory: apps/android
        run: ./gradlew :app:testProductionDebugUnitTest --no-daemon
