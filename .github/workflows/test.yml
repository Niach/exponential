name: test

# CI test gate: typecheck + unit tests for the bun workspaces, the desktop
# Rust workspace, and the Android app, plus a from-scratch migration run
# against a real Postgres. Runs on every push/PR to master so red tests are
# visible before anything ships (build-issues-web.yml runs the web portion
# again as a hard gate before pushing the production image).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck web
        run: bun run typecheck
      - name: Web unit tests
        env:
          # Unit tests never query the DB, but db/connection.ts throws at
          # import time without a URL — give it an unreachable dummy.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:59999/ci
        run: bun run test
      - name: Widget unit tests
        run: bun run test:widget
      - name: Steer relay + ticket tests
        run: bun run test:steer-relay

  migrations:
    # EXP-112: drizzle-kit can generate SQL that fails on every real DB
    # (e.g. DROP TABLE CASCADE before its referencing DROP CONSTRAINTs —
    # EXP-111's migration 0023), and nothing else in CI ever executes the
    # migrations. Run the full chain from scratch against a real Postgres,
    # then the custom triggers that deploys apply on top.
    # EXP-137: additionally detect SILENT drift — a migration that executes
    # cleanly but no longer matches its snapshot (b934ab4d: 0026 lost its
    # DROP statements), leaving every DB that applied it permanently
    # diverged from the drizzle schema with no later error.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exponential
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/exponential
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Apply migrations from scratch
        run: bun run migrate
      - name: Detect silent migration drift
        # Assert `drizzle-kit push` is a NO-OP on the freshly-migrated DB:
        # dump the schema, push, dump again — any delta means the migration
        # chain did not faithfully produce packages/db-schema (a migration
        # file drifted from its snapshot, or schema.ts changed without a
        # generated migration), and the diff shows the drift as the DDL push
        # had to apply. Same-DB before/after keeps the comparison
        # byte-stable (no cross-DB pg_dump ordering to normalize). pg_dump
        # runs in the service container (the runner's client is older than
        # the server); the \restrict guard token pg_dump emits is a per-dump
        # random nonce, hence stripped; -N drizzle excludes the migration
        # ledger, which push never manages. Runs BEFORE the trigger step so
        # trigger objects never enter the dumps. The step timeout guards
        # against drizzle-kit's interactive rename prompt, reachable only
        # when drift already exists (ambiguous add+drop column pair).
        timeout-minutes: 10
        run: |
          dump_schema() {
            docker exec ${{ job.services.postgres.id }} pg_dump -U postgres --schema-only --no-owner --no-privileges -N drizzle exponential \
              | grep -vE '^\\(un)?restrict '
          }
          dump_schema > /tmp/schema-before.sql
          (cd apps/web && bun x drizzle-kit push --force)
          dump_schema > /tmp/schema-after.sql
          if ! diff -u /tmp/schema-before.sql /tmp/schema-after.sql; then
            echo '::error::Silent migration drift: the migrated DB does not match packages/db-schema. Either a migration SQL file no longer matches its snapshot (lost-DROP class, see b934ab4d) or schema.ts changed without a generated migration. The diff above is the DDL drizzle-kit push applied to reconcile.'
            exit 1
          fi
      - name: Apply custom triggers
        # Use the service container's own psql (mirrors the documented
        # deploy command) — ON_ERROR_STOP so SQL errors fail the job.
        run: docker exec -i ${{ job.services.postgres.id }} psql -U postgres -d exponential -v ON_ERROR_STOP=1 < apps/web/src/db/out/custom/0001_triggers.sql

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Linux system deps (wgpu/gpui)
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev \
            libssl-dev libfontconfig1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
      - name: Cargo tests
        working-directory: apps/desktop
        run: cargo test --no-fail-fast

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;35.0.0'
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/android/**/*.gradle*', 'apps/android/gradle/wrapper/gradle-wrapper.properties', 'apps/android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Android unit tests
        working-directory: apps/android
        run: ./gradlew :app:testProductionDebugUnitTest --no-daemon
